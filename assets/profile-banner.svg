<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Akhil Reddy Danda — Senior Software Engineer — Backend and AI/ML">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="45%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base gradient -->
  <rect width="1200" height="240" fill="url(#bg)"/>

  <!-- Subtle radial highlights -->
  <circle cx="200" cy="120" r="220" fill="url(#glow1)"/>
  <circle cx="1000" cy="120" r="220" fill="url(#glow2)"/>

  <!-- Decorative dot grid (top-right) -->
  <g fill="#58A6FF" opacity="0.35">
    <circle cx="950" cy="40"  r="1.5"/><circle cx="980" cy="40"  r="1.5"/><circle cx="1010" cy="40" r="1.5"/><circle cx="1040" cy="40" r="1.5"/><circle cx="1070" cy="40" r="1.5"/><circle cx="1100" cy="40" r="1.5"/><circle cx="1130" cy="40" r="1.5"/>
    <circle cx="950" cy="60"  r="1.5"/><circle cx="980" cy="60"  r="1.5"/><circle cx="1010" cy="60" r="1.5"/><circle cx="1040" cy="60" r="1.5"/><circle cx="1070" cy="60" r="1.5"/><circle cx="1100" cy="60" r="1.5"/><circle cx="1130" cy="60" r="1.5"/>
    <circle cx="950" cy="80"  r="1.5"/><circle cx="980" cy="80"  r="1.5"/><circle cx="1010" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1070" cy="80" r="1.5"/><circle cx="1100" cy="80" r="1.5"/><circle cx="1130" cy="80" r="1.5"/>
  </g>

  <!-- Decorative dot grid (bottom-left) -->
  <g fill="#A78BFA" opacity="0.35">
    <circle cx="60"  cy="180" r="1.5"/><circle cx="90"  cy="180" r="1.5"/><circle cx="120" cy="180" r="1.5"/><circle cx="150" cy="180" r="1.5"/><circle cx="180" cy="180" r="1.5"/><circle cx="210" cy="180" r="1.5"/><circle cx="240" cy="180" r="1.5"/>
    <circle cx="60"  cy="200" r="1.5"/><circle cx="90"  cy="200" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="150" cy="200" r="1.5"/><circle cx="180" cy="200" r="1.5"/><circle cx="210" cy="200" r="1.5"/><circle cx="240" cy="200" r="1.5"/>
  </g>

  <!-- Subtle wave -->
  <path d="M 0 215 Q 300 195 600 215 T 1200 215" stroke="#58A6FF" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M 0 225 Q 300 205 600 225 T 1200 225" stroke="#A78BFA" stroke-width="1.2" fill="none" opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="110"
        font-family="'Segoe UI', 'SF Pro Display', Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="58" font-weight="800" letter-spacing="1"
        fill="#FFFFFF" text-anchor="middle" filter="url(#soft)">Akhil Reddy Danda</text>

  <!-- Subtitle -->
  <text x="600" y="150"
        font-family="'Segoe UI', 'SF Pro Display', Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22" font-weight="600" letter-spacing="2"
        fill="#E2E8F0" text-anchor="middle">SENIOR SOFTWARE ENGINEER &#183; BACKEND &amp; AI/ML</text>

  <!-- Tagline -->
  <text x="600" y="180"
        font-family="'Segoe UI', 'SF Pro Display', Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14" font-weight="400" letter-spacing="1"
        fill="#94A3B8" text-anchor="middle">Production AI Systems &#183; Distributed Backends &#183; Agentic LLM Pipelines</text>
</svg>
